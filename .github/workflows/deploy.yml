name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone YukiOS
        run: git clone https://github.com/Reeyuki/YukiOS.git

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          package_json_file: YukiOS/webos-desktop/package.json  # ← updated

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: YukiOS/webos-desktop/pnpm-lock.yaml  # ← updated

      - name: Install dependencies
        working-directory: YukiOS/webos-desktop  # ← updated
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: YukiOS/webos-desktop  # ← updated
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: YukiOS/webos-desktop/dist  # ← updated

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
